version: '3.8'

services:
  web:
    image: aabdulmoiz/student-app:latest
    ports:
      - "80:5000"
    environment:
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_HOST: db
      DB_NAME: studentdb
    depends_on:
      db:
        condition: service_healthy
    restart: always

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: studentdb
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  db_data: